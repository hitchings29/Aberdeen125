<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>125'in Scotland - Itinerary</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f5f5f5;
        }
        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }
        @keyframes shimmer {
            0% { transform: translateX(-150%) skewX(-12deg); }
            50%, 100% { transform: translateX(250%) skewX(-12deg); }
        }
        .animate-shimmer {
            animation: shimmer 3s infinite;
        }
        .radar-pulse {
            animation: ping 1.5s cubic-bezier(0, 0, 0.2, 1) infinite;
        }
        @keyframes ping {
            75%, 100% {
                transform: scale(2.5);
                opacity: 0;
            }
        }
        /* Expand/Collapse Transition */
        .collapsible-content {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .expanded .collapsible-content {
            grid-template-rows: 1fr;
        }
        .collapsible-inner {
            overflow: hidden;
        }
        .chevron-icon {
            transition: transform 0.4s ease;
        }
        .expanded .chevron-icon {
            transform: rotate(180deg);
        }
    </style>
</head>
<body class="text-neutral-900 pb-20">

    <div class="relative h-[48vh] w-full bg-black overflow-hidden shadow-2xl">
        <img 
            src="https://cdn.mos.cms.futurecdn.net/9ipSrNdjMHP6Svi38L9YQG.jpg" 
            alt="Forth Bridge" 
            class="object-cover w-full h-full saturate-[1.2] contrast-[1.1]" 
        />
        <div class="absolute inset-0 bg-gradient-to-b from-black/60 via-transparent to-neutral-100"></div>
        
        <div class="absolute top-10 left-8 right-8 flex justify-between items-center">
           <div class="flex items-center gap-3 bg-black/50 backdrop-blur-xl px-4 py-2 rounded-full border border-white/20 shadow-lg">
             <div class="flex items-center gap-2 pr-3 border-r border-white/10">
               <i data-lucide="clock" class="w-3.5 h-3.5 text-amber-500"></i>
               <p id="live-clock" class="text-xs font-mono font-bold text-white tracking-wider w-16">00:00:00</p>
             </div>
             <div class="flex items-center gap-2 pl-1">
               <i data-lucide="cloud" class="w-3.5 h-3.5 text-blue-400"></i>
               <p class="text-[10px] font-black text-white/90 uppercase tracking-widest">Aberdeen: 11°C • Cloudy</p>
             </div>
           </div>
        </div>

        <div class="absolute bottom-16 left-8 right-8">
          <h1 class="text-6xl md:text-8xl font-black text-neutral-900 tracking-tighter leading-[0.75] uppercase drop-shadow-[0_4px_4px_rgba(255,255,255,0.4)]">
            125'in<br/><span class="text-neutral-800">Scotland</span>
          </h1>
          <p class="mt-4 text-[10px] md:text-[11px] font-black text-neutral-600 uppercase tracking-[0.6em] ml-1">Skipton to Aberdeen</p>
        </div>
    </div>

    <div id="itinerary-content" class="px-6 mt-12 relative z-10 max-w-3xl mx-auto">
        </div>

    <footer class="px-8 mt-20 text-center pb-16">
        <div class="max-w-[200px] mx-auto opacity-10 filter invert mb-8">
           <i data-lucide="train-front" class="w-12 h-12 mx-auto"></i>
        </div>
        <p class="text-[10px] font-black text-neutral-400 uppercase tracking-[0.7em] leading-loose">
          Mind the Gap • Hear the 125 Roar
        </p>
        <p class="text-[8px] text-neutral-300 font-bold uppercase mt-4">2026 Northern Scottish Service</p>
    </footer>

    <script>
        const IMAGES = {
            trains: {
                northern158: "https://cdn.prgloo.com/media/8a0af99482d5432bb9cbcceaa9b84da3.jpg?width=968&height=1452",
                tpeNova1: "https://d1c4d7gnm6as1q.cloudfront.net/Pictures/1590x1060fit/1/1/0/42110_transpennineexpress802201atlamburtonphototonymiles_660666.jpg",
                scotrail125: "https://scontent-lhr8-2.xx.fbcdn.net/v/t39.30808-6/496096640_9809367622509129_5076903993433265085_n.jpg?_nc_cat=106&ccb=1-7&_nc_sid=e06c5d&_nc_ohc=VaJlqCnTgPQQ7kNvwGfE1jy&_nc_oc=AdrD1ZN-movckKMJAiyYjA1YIoUAxZarJGcRsD0r7gU73j5-ErpTDivwQaxzpVgSaZg&_nc_zt=23&_nc_ht=scontent-lhr8-2.xx&_nc_gid=5tPKckRqpK0Qb0RVf8c9pQ&_nc_ss=7a3a8&oh=00_Af0B5YuaNeCSgfWeEiyBOI6GT5JQ3D55MuUW542tNfEenA&oe=69D40FC0",
            },
            places: {
                travelodge: "https://media.travelodge.co.uk/image/upload/c_fill,h_470,w_850/Rebase/Top%20of%20the%20page/GB0112_ABERDEEN_CENTRAL_EXT_Update_2208.webp"
            }
        };

        const itineraryData = [
            {
                date: "Wed, Apr 22",
                type: "OUT",
                legs: [
                    { id: "w1", departTime: "06:01", departStation: "Skipton", arriveTime: "08:02", arriveStation: "Carlisle", operator: "Northern", trainClass: "Class 158", trainImg: IMAGES.trains.northern158, liveTrackUrl: "https://www.realtimetrains.co.uk/service/gb-nr:Y26401/2026-04-22/detailed", isFreeSeating: true },
                    { id: "w2", departTime: "08:17", departStation: "Carlisle", arriveTime: "09:41", arriveStation: "Edinburgh", operator: "TransPennine", trainClass: "Nova 1", trainImg: IMAGES.trains.tpeNova1, liveTrackUrl: "https://www.realtimetrains.co.uk/service/gb-nr:C74073/2026-04-22/detailed", coach: "B", seats: "01 & 02" },
                    { id: "w3", departTime: "11:30", departStation: "Edinburgh", arriveTime: "13:50", arriveStation: "Aberdeen", operator: "ScotRail", trainClass: "Intercity 125", trainImg: IMAGES.trains.scotrail125, liveTrackUrl: "https://www.realtimetrains.co.uk/service/gb-nr:Y38533/2026-04-22/detailed", coach: "C", seats: "39F & 40F" }
                ],
                accommodation: { id: "hotel-a1", name: "Travelodge Aberdeen Central", img: IMAGES.places.travelodge, url: "https://www.travelodge.co.uk/hotels/1/Aberdeen-Central-hotel", checkIn: "15:00" }
            },
            {
                date: "Thu, Apr 23",
                type: "RTN",
                legs: [
                    { id: "t1", departTime: "12:23", departStation: "Stonehaven", arriveTime: "14:28", arriveStation: "Edinburgh", operator: "ScotRail", trainClass: "Intercity 125", trainImg: IMAGES.trains.scotrail125, liveTrackUrl: "https://www.realtimetrains.co.uk/service/gb-nr:Y38589/2026-04-23/detailed", coach: "D", seats: "15A & 16A" },
                    { id: "t2", departTime: "16:08", departStation: "Edinburgh", arriveTime: "17:52", arriveStation: "Newcastle", operator: "TransPennine Express", trainClass: "Nova 1", trainImg: IMAGES.trains.tpeNova1, liveTrackUrl: "https://www.realtimetrains.co.uk/service/gb-nr:L37280/2026-04-23/detailed", coach: "B", seats: "53 & 54", seatNote: "Switch to B 69/70 after East Linton" },
                    { id: "t3", departTime: "18:01", departStation: "Newcastle", arriveTime: "19:27", arriveStation: "Leeds", operator: "TransPennine Express", trainClass: "Nova 1", trainImg: IMAGES.trains.tpeNova1, liveTrackUrl: "https://www.realtimetrains.co.uk/service/gb-nr:L37252/2026-04-23/detailed", coach: "C", seats: "65 & 66" },
                    { id: "t4", departTime: "19:49", departStation: "Leeds", arriveTime: "20:26", arriveStation: "Skipton", operator: "Northern", trainClass: "Class 158", trainImg: IMAGES.trains.northern158, liveTrackUrl: "https://www.realtimetrains.co.uk/service/gb-nr:G91960/2026-04-23/detailed", isFreeSeating: true }
                ]
            }
        ];

        function calculateTimeDiff(start, end) {
            if (!start || !end) return null;
            const [sH, sM] = start.split(':').map(Number);
            const [eH, eM] = end.split(':').map(Number);
            let diff = (eH * 60 + eM) - (sH * 60 + sM);
            if (diff < 0) diff += 1440; // Handles overnight if needed
            const h = Math.floor(diff / 60);
            const m = diff % 60;
            return h > 0 ? `${h}h ${m}m` : `${m}m`;
        }

        function toggleCollapsible(id) {
            const el = document.getElementById(id);
            el.classList.toggle('expanded');
        }

        function renderApp() {
            const container = document.getElementById('itinerary-content');
            let html = '';

            itineraryData.forEach(day => {
                html += `
                <div class="mb-24">
                    <div class="flex items-end justify-between mb-10 border-b-4 border-neutral-900 pb-3">
                        <div class="flex flex-col">
                            <span class="text-[10px] font-black text-amber-600 uppercase tracking-[0.3em] mb-1">Journeys</span>
                            <h2 class="text-4xl md:text-5xl font-black text-neutral-900 uppercase tracking-tighter italic leading-none">${day.date}</h2>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] font-black text-neutral-400 uppercase tracking-[0.2em] mb-1">Route Type</p>
                            <div class="text-2xl md:text-3xl font-black uppercase tracking-tighter">${day.type}</div>
                        </div>
                    </div>
                    <div class="space-y-4">`;

                day.legs.forEach((leg, idx) => {
                    const journeyTime = calculateTimeDiff(leg.departTime, leg.arriveTime);
                    html += `
                    <div id="collapsible-${leg.id}" class="leg-card bg-[#111] rounded-2xl shadow-2xl overflow-hidden mb-4 border border-neutral-800 transition-all">
                        <div onclick="toggleCollapsible('collapsible-${leg.id}')" class="p-5 flex items-center justify-between cursor-pointer hover:bg-neutral-800 transition-colors group">
                            <div class="flex items-center gap-4 md:gap-10">
                                <div class="flex flex-col min-w-[110px]">
                                    <div class="flex items-baseline gap-1.5">
                                      <span class="text-amber-500 font-mono text-2xl font-bold leading-none tracking-tighter">${leg.departTime}</span>
                                      <span class="text-neutral-500 font-mono text-xs font-bold">/ ${leg.arriveTime}</span>
                                    </div>
                                    <div class="flex items-center gap-1 mt-1 text-neutral-600">
                                        <i data-lucide="timer" class="w-2 h-2"></i>
                                        <span class="text-[8px] font-black uppercase tracking-widest">${journeyTime} journey</span>
                                    </div>
                                </div>
                                <div class="flex flex-col">
                                    <h3 class="text-white text-lg font-black uppercase tracking-tight leading-none group-hover:text-amber-400 transition-colors">${leg.departStation}</h3>
                                    <div class="flex items-center gap-2 mt-1">
                                        <i data-lucide="chevrons-right" class="w-2.5 h-2.5 text-neutral-600"></i>
                                        <span class="text-neutral-400 text-[9px] font-bold uppercase tracking-widest">${leg.arriveStation}</span>
                                    </div>
                                </div>
                            </div>
                            <div class="flex items-center gap-3">
                                <a href="${leg.liveTrackUrl}" target="_blank" onclick="event.stopPropagation()" class="p-2.5 bg-neutral-900 hover:bg-amber-500 text-amber-500 hover:text-black rounded-full transition-all border border-neutral-800 hover:border-amber-400 shadow-lg relative group/icon block">
                                    <div class="absolute inset-0 w-full h-full border border-amber-500/30 rounded-full radar-pulse"></div>
                                    <i data-lucide="train-front" class="w-4 h-4 stroke-[2.5px]"></i>
                                </a>
                                <i data-lucide="chevron-down" class="chevron-icon w-5 h-5 text-neutral-600 group-hover:text-amber-500"></i>
                            </div>
                        </div>

                        <div class="collapsible-content">
                            <div class="collapsible-inner">
                                <div class="relative h-64 w-full overflow-hidden border-t border-neutral-800">
                                    <img src="${leg.trainImg}" class="object-cover w-full h-full brightness-75 contrast-125" />
                                    <div class="absolute inset-0 bg-gradient-to-t from-[#111] via-transparent to-black/20"></div>
                                    
                                    <div class="absolute right-4 bottom-4">
                                        <a href="${leg.liveTrackUrl}" target="_blank" onclick="event.stopPropagation()" class="group relative flex items-center bg-amber-500 hover:bg-amber-400 text-black px-4 py-2 rounded-full font-black text-xs uppercase tracking-tighter transition-all shadow-lg overflow-hidden">
                                            <div class="absolute inset-0 w-full h-full bg-gradient-to-r from-transparent via-white/40 to-transparent -translate-x-full animate-shimmer skew-x-12"></div>
                                            <div class="relative z-10 flex items-center gap-2.5">
                                                <div class="relative flex items-center justify-center w-7 h-7 bg-black/10 rounded-full overflow-hidden">
                                                    <span class="absolute inset-0 border border-black/20 rounded-full radar-pulse"></span>
                                                    <i data-lucide="train-front-tunnel" class="w-3.5 h-3.5 stroke-[3px]"></i>
                                                </div>
                                                <div class="flex flex-col pr-1">
                                                    <span class="text-[10px] tracking-widest leading-none font-black">Train TRACKER</span>
                                                    <div class="flex items-center gap-1.5 mt-0.5">
                                                        <span class="flex h-1 w-1 rounded-full bg-black animate-pulse"></span>
                                                        <span class="text-[7px] font-bold opacity-70 uppercase tracking-[0.1em]">Realtime Trains</span>
                                                    </div>
                                                </div>
                                                <i data-lucide="external-link" class="w-3 h-3 stroke-[3px] opacity-60"></i>
                                            </div>
                                        </a>
                                    </div>
                                </div>
                                <div class="p-6 bg-neutral-900/40">
                                    <div class="flex flex-col gap-4">
                                        <div class="flex justify-between items-start border-b border-neutral-800 pb-4">
                                            <div class="space-y-1">
                                                <p class="text-amber-500 font-mono text-4xl font-bold tracking-tight">${leg.departTime}</p>
                                                <h3 class="text-white text-xl font-black uppercase tracking-tight leading-none">${leg.departStation}</h3>
                                                <p class="text-neutral-500 text-[10px] font-bold uppercase tracking-widest">${leg.operator}</p>
                                            </div>
                                            <div class="text-right space-y-1">
                                                <p class="text-neutral-400 font-mono text-xl font-bold">${leg.arriveTime}</p>
                                                <h3 class="text-neutral-300 text-sm font-bold uppercase tracking-tight">${leg.arriveStation}</h3>
                                                <div class="flex items-center justify-end gap-1.5 mt-1">
                                                    <i data-lucide="timer" class="w-3 h-3 text-neutral-600"></i>
                                                    <p class="text-neutral-600 text-[10px] font-black uppercase tracking-widest">${journeyTime}</p>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="bg-black border border-amber-900/30 p-4 rounded-lg flex flex-wrap items-center gap-4 shadow-inner">
                                            ${leg.isFreeSeating ? `
                                                <div class="flex flex-col">
                                                    <span class="text-neutral-600 text-[8px] font-black uppercase tracking-widest">Seating</span>
                                                    <span class="text-amber-500 font-mono text-lg font-bold uppercase">Free Seating</span>
                                                </div>
                                            ` : `
                                                <div class="flex flex-col">
                                                    <span class="text-neutral-600 text-[8px] font-black uppercase tracking-widest">Coach</span>
                                                    <span class="text-amber-500 font-mono text-lg font-bold">${leg.coach}</span>
                                                </div>
                                                <div class="w-[1px] h-8 bg-neutral-800 mx-1"></div>
                                                <div class="flex flex-col">
                                                    <span class="text-neutral-600 text-[8px] font-black uppercase tracking-widest">Seats</span>
                                                    <span class="text-amber-500 font-mono text-lg font-bold tracking-widest">${leg.seats}</span>
                                                </div>
                                            `}
                                            <div class="flex-1 text-right flex flex-col justify-center">
                                                <span class="text-neutral-600 text-[8px] font-black uppercase tracking-widest">Locomotive</span>
                                                <span class="text-neutral-300 font-bold text-xs uppercase italic">${leg.trainClass}</span>
                                            </div>
                                        </div>
                                        ${leg.seatNote ? `
                                            <div class="flex items-center gap-3 bg-amber-500/5 border border-amber-500/20 px-4 py-3 rounded-xl">
                                                <i data-lucide="info" class="w-3 h-3 text-amber-500"></i>
                                                <p class="text-[9px] font-bold text-amber-100/70 uppercase tracking-wide leading-tight">${leg.seatNote}</p>
                                            </div>
                                        ` : ''}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>`;

                    const nextLeg = day.legs[idx + 1];
                    if (nextLeg) {
                        const conn = calculateTimeDiff(leg.arriveTime, nextLeg.departTime);
                        html += `
                        <div class="flex items-center gap-4 mb-4 px-2">
                            <div class="relative flex items-center gap-3 bg-neutral-900 text-white px-4 py-1.5 rounded-xl text-[9px] font-black uppercase tracking-[0.15em] border border-neutral-700 shadow-xl overflow-hidden">
                                <div class="absolute inset-0 bg-amber-500/5 animate-pulse"></div>
                                <div class="relative flex items-center gap-2">
                                    <i data-lucide="clock-3" class="w-3 h-3 text-amber-500"></i> 
                                    <span>${conn} Transfer at ${leg.arriveStation}</span>
                                </div>
                            </div>
                            <div class="flex-1 h-[1px] bg-neutral-200/10 rounded-full"></div>
                        </div>`;
                    }
                });

                html += '</div>';

                if (day.accommodation) {
                    html += `
                    <div id="${day.accommodation.id}" class="mt-8 mb-24 bg-[#111] rounded-2xl shadow-2xl overflow-hidden border border-neutral-800 transition-all">
                        <div onclick="toggleCollapsible('${day.accommodation.id}')" class="p-5 flex items-center justify-between cursor-pointer hover:bg-neutral-800 transition-colors group">
                            <div class="flex items-center gap-4 md:gap-10">
                                <div class="flex flex-col min-w-[110px]">
                                    <div class="flex items-baseline gap-1.5">
                                      <span class="text-blue-500 font-mono text-2xl font-bold leading-none tracking-tighter">${day.accommodation.checkIn}</span>
                                    </div>
                                    <span class="text-neutral-600 text-[8px] font-black uppercase tracking-widest mt-1">Check-in Window</span>
                                </div>
                                <div class="flex flex-col">
                                    <h3 class="text-white text-lg font-black uppercase tracking-tight leading-none group-hover:text-blue-400 transition-colors">${day.accommodation.name}</h3>
                                    <div class="flex items-center gap-2 mt-1">
                                        <i data-lucide="map-pin" class="w-2.5 h-2.5 text-neutral-600"></i>
                                        <span class="text-neutral-400 text-[9px] font-bold uppercase tracking-widest">9 Bridge St, Aberdeen AB11 6JL</span>
                                    </div>
                                </div>
                            </div>
                            <div class="flex items-center gap-3">
                                <a href="${day.accommodation.url}" target="_blank" onclick="event.stopPropagation()" class="p-2.5 bg-neutral-900 hover:bg-blue-500 text-blue-500 hover:text-black rounded-full transition-all border border-neutral-800 hover:border-blue-400 shadow-lg block">
                                    <i data-lucide="map" class="w-4 h-4 stroke-[2.5px]"></i>
                                </a>
                                <i data-lucide="chevron-down" class="chevron-icon w-5 h-5 text-neutral-600 group-hover:text-blue-500"></i>
                            </div>
                        </div>

                        <div class="collapsible-content">
                            <div class="collapsible-inner">
                                <div class="relative h-64 w-full overflow-hidden border-t border-neutral-800">
                                    <img src="${day.accommodation.img}" class="object-cover w-full h-full brightness-75 contrast-125 saturate-50" />
                                    <div class="absolute inset-0 bg-gradient-to-t from-[#111] via-transparent to-black/20"></div>
                                    
                                    <div class="absolute right-4 bottom-4">
                                        <a href="${day.accommodation.url}" target="_blank" onclick="event.stopPropagation()" class="group relative flex items-center bg-blue-500 hover:bg-blue-400 text-black px-4 py-2 rounded-full font-black text-xs uppercase tracking-tighter transition-all shadow-lg overflow-hidden">
                                            <div class="absolute inset-0 w-full h-full bg-gradient-to-r from-transparent via-white/40 to-transparent -translate-x-full animate-shimmer skew-x-12"></div>
                                            <div class="relative z-10 flex items-center gap-2.5">
                                                <i data-lucide="map" class="w-3.5 h-3.5 stroke-[3px]"></i>
                                                <span class="text-[10px] tracking-widest leading-none font-black">TRAVELODGE WEBSITE</span>
                                                <i data-lucide="external-link" class="w-3 h-3 stroke-[3px] opacity-60"></i>
                                            </div>
                                        </a>
                                    </div>
                                </div>
                                <div class="p-6 bg-neutral-900/40">
                                    <div class="bg-black border border-blue-900/30 p-4 rounded-lg flex items-center justify-between shadow-inner">
                                        <div class="flex flex-col">
                                            <span class="text-neutral-600 text-[8px] font-black uppercase tracking-widest">Booking Status</span>
                                            <div class="flex items-center gap-2 mt-0.5">
                                                <div class="w-2 h-2 rounded-full bg-green-500"></div>
                                                <span class="text-neutral-300 font-mono text-lg font-bold uppercase tracking-tighter">Confirmed</span>
                                            </div>
                                        </div>
                                        <div class="text-right flex flex-col justify-center">
                                            <span class="text-neutral-600 text-[8px] font-black uppercase tracking-widest">Earliest Arrival</span>
                                            <span class="text-blue-400 font-mono text-xl font-bold italic">${day.accommodation.checkIn} HRS</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>`;
                }
            });

            container.innerHTML = html;
            lucide.createIcons();
        }

        function updateClock() {
            const now = new Date();
            const clockEl = document.getElementById('live-clock');
            if (clockEl) {
                clockEl.textContent = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            }
        }

        window.onload = () => {
            renderApp();
            setInterval(updateClock, 1000);
            updateClock();
        };
    </script>
</body>
</html>
