<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>125'in Scotland - Itinerary</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f5f5f5;
            -webkit-tap-highlight-color: transparent;
        }
        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }
        
        /* Train Track Animations */
        @keyframes drawTrack {
            from { stroke-dashoffset: 2000; }
            to { stroke-dashoffset: 0; }
        }
        .track-rail {
            stroke-dasharray: 2000;
            stroke-dashoffset: 2000;
        }
        .expanded .track-rail {
            animation: drawTrack 3.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        .track-sleepers {
            stroke-dasharray: 2, 12;
            opacity: 0;
            transition: opacity 1.5s ease;
        }
        .expanded .track-sleepers {
            opacity: 0.3;
        }

        .waypoint {
            opacity: 0;
            transform: translateY(5px);
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .expanded .waypoint {
            opacity: 1;
            transform: translateY(0);
        }

        @keyframes shimmer {
            0% { transform: translateX(-150%) skewX(-12deg); }
            50%, 100% { transform: translateX(250%) skewX(-12deg); }
        }
        .animate-shimmer {
            animation: shimmer 3s infinite;
        }

        /* Expand/Collapse Transition */
        .collapsible-content {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .expanded .collapsible-content {
            grid-template-rows: 1fr;
        }
        .collapsible-inner {
            overflow: hidden;
        }
        .chevron-icon {
            transition: transform 0.4s ease;
        }
        .expanded .chevron-icon {
            transform: rotate(180deg);
        }

        .map-overlay-container {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }
        .map-overlay-container svg {
            width: 100%;
            height: 100%;
            display: block;
        }
        
        .waypoint-bg {
            fill: rgba(10, 10, 10, 0.8);
            rx: 6px;
        }
    </style>
</head>

        const IMAGES = {

                scotrail125: "https://scontent-lhr8-2.xx.fbcdn.net/v/t39.30808-6/496096640_9809367622509129_5076903993433265085_n.jpg?_nc_cat=106&ccb=1-7&_nc_sid=e06c5d&_nc_ohc=VaJlqCnTgPQQ7kNvwGfE1jy&_nc_oc=AdrD1ZN-movckKMJAiyYjA1YIoUAxZarJGcRsD0r7gU73j5-ErpTDivwQaxzpVgSaZg&_nc_zt=23&_nc_ht=scontent-lhr8-2.xx&_nc_gid=5tPKckRqpK0Qb0RVf8c9pQ&_nc_ss=7a3a8&oh=00_Af0B5YuaNeCSgfWeEiyBOI6GT5JQ3D55MuUW542tNfEenA&oe=69D40FC0",

        const itineraryData = [
            {
                date: "Wed, Apr 22",

                legs: [
                    { id: "w1", departTime: "06:01", departStation: "Skipton", arriveTime: "08:02", arriveStation: "Carlisle", operator: "Northern", trainClass: "Class 158", trainImg: IMAGES.trains.northern158, liveTrackUrl: "https://www.realtimetrains.co.uk/service/gb-nr:Y26401/2026-04-22/detailed", isFreeSeating: true },
                    { id: "w2", departTime: "08:17", departStation: "Carlisle", arriveTime: "09:41", arriveStation: "Edinburgh", operator: "TransPennine", trainClass: "Nova 1", trainImg: IMAGES.trains.tpeNova1, liveTrackUrl: "https://www.realtimetrains.co.uk/service/gb-nr:C74073/2026-04-22/detailed", coach: "B", seats: "01 & 02" },
                    { id: "w3", departTime: "11:30", departStation: "Edinburgh", arriveTime: "13:50", arriveStation: "Aberdeen", operator: "ScotRail", trainClass: "Intercity 125", trainImg: IMAGES.trains.scotrail125, liveTrackUrl: "https://www.realtimetrains.co.uk/service/gb-nr:Y38533/2026-04-22/detailed", coach: "C", seats: "39F & 40F" }
                ],
                accommodation: { id: "hotel-a1", name: "Travelodge Aberdeen Central", img: IMAGES.places.travelodge, url: "https://www.travelodge.co.uk/hotels/1/Aberdeen-Central-hotel", checkIn: "15:00" }
            },
            {
                date: "Thu, Apr 23",
                type: "RTN",
                legs: [
                    { id: "t1", departTime: "12:23", departStation: "Stonehaven", arriveTime: "14:28", arriveStation: "Edinburgh", operator: "ScotRail", trainClass: "Intercity 125", trainImg: IMAGES.trains.scotrail125, liveTrackUrl: "https://www.realtimetrains.co.uk/service/gb-nr:Y38589/2026-04-23/detailed", coach: "D", seats: "15A & 16A" },
                    { id: "t2", departTime: "16:08", departStation: "Edinburgh", arriveTime: "17:52", arriveStation: "Newcastle", operator: "TransPennine Express", trainClass: "Nova 1", trainImg: IMAGES.trains.tpeNova1, liveTrackUrl: "https://www.realtimetrains.co.uk/service/gb-nr:L37280/2026-04-23/detailed", coach: "B", seats: "53 & 54", seatNote: "Switch to B 69/70 after East Linton" },
                    { id: "t3", departTime: "18:01", departStation: "Newcastle", arriveTime: "19:27", arriveStation: "Leeds", operator: "TransPennine Express", trainClass: "Nova 1", trainImg: IMAGES.trains.tpeNova1, liveTrackUrl: "https://www.realtimetrains.co.uk/service/gb-nr:L37252/2026-04-23/detailed", coach: "C", seats: "65 & 66" },
                    { id: "t4", departTime: "19:49", departStation: "Leeds", arriveTime: "20:26", arriveStation: "Skipton", operator: "Northern", trainClass: "Class 158", trainImg: IMAGES.trains.northern158, liveTrackUrl: "https://www.realtimetrains.co.uk/service/gb-nr:G91960/2026-04-23/detailed", isFreeSeating: true }
                ]
            }
        ];

        // Calculates exact bounding box to frame the route perfectly on mobile devices
        function calculateViewBox(route, start, end) {
            let minX = Math.min(start[0], end[0]), maxX = Math.max(start[0], end[0]);
            let minY = Math.min(start[1], end[1]), maxY = Math.max(start[1], end[1]);

            route.waypoints.forEach(wp => {
                if(wp.x < minX) minX = wp.x;
                if(wp.x > maxX) maxX = wp.x;
                if(wp.y < minY) minY = wp.y;
                if(wp.y > maxY) maxY = wp.y;
            });

            // Dynamic padding based on bounds ensures labels aren't clipped
            const pX = Math.max(40, (maxX - minX) * 0.35); 
            const pY = Math.max(40, (maxY - minY) * 0.35);

            return `${minX - pX} ${minY - pY} ${(maxX - minX) + (pX*2)} ${(maxY - minY) + (pY*2)}`;
        }

        // Helper to estimate text width for the dark pill background
        function estimateTextWidth(text, size) {
            return text.length * (size * 0.6) + 12; // approximate character width + padding
        }

        function createTrainTrackOverlay(from, to) {
            const key = `${from}-${to}`;
            const route = ROUTE_DATA[key];
            const startCoords = STATION_COORDS[from];
            const endCoords = STATION_COORDS[to];
            
            if(!route || !startCoords || !endCoords) return '';

            const viewBox = calculateViewBox(route, startCoords, endCoords);
            const [vbX, vbY, vbW, vbH] = viewBox.split(' ').map(Number);
            const centerX = vbX + (vbW / 2);

            let waypointHtml = '';
            route.waypoints.forEach((wp, i) => {
                const isRightSide = wp.x > centerX;
                const anchor = isRightSide ? 'end' : 'start';
                const offset = isRightSide ? -10 : 10;
                const fontSize = wp.highlight ? 10 : 8;
                
                const textWidth = estimateTextWidth(wp.name, fontSize);
                const bgX = isRightSide ? wp.x + offset - textWidth + 6 : wp.x + offset - 6;

                waypointHtml += `
                <g class="waypoint" style="transition-delay: ${0.8 + (i * 0.15)}s">
                    <circle cx="${wp.x}" cy="${wp.y}" r="${wp.highlight ? '2.5' : '1.5'}" fill="${wp.highlight ? '#fbbf24' : '#fff'}" filter="${wp.highlight ? 'url(#glow)' : ''}" />
                    
                    <!-- Text Background Pill for Legibility -->
                    <rect class="waypoint-bg" x="${bgX}" y="${wp.y - fontSize/2 - 5}" width="${textWidth}" height="${fontSize + 10}" />
                    
                    <text x="${wp.x + offset}" y="${wp.y + 3}" 
                          fill="${wp.highlight ? '#fbbf24' : '#f5f5f5'}" 
                          font-family="JetBrains Mono" 
                          font-weight="${wp.highlight ? '900' : 'bold'}" 
                          font-size="${fontSize}" 
                          text-anchor="${anchor}"
                          class="uppercase tracking-tighter">${wp.name}</text>
                </g>`;
            });

            // Origin/Destination labels logic
            const startIsRight = startCoords[0] > centerX;
            const startAnchor = startIsRight ? 'end' : 'start';
            const startOffset = startIsRight ? -16 : 16;
            const startTextW = estimateTextWidth(from, 14);
            const startBgX = startIsRight ? startCoords[0] + startOffset - startTextW + 6 : startCoords[0] + startOffset - 6;

            const endIsRight = endCoords[0] > centerX;
            const endAnchor = endIsRight ? 'end' : 'start';
            const endOffset = endIsRight ? -22 : 22;
            const endTextW = estimateTextWidth(to, 20);
            const endBgX = endIsRight ? endCoords[0] + endOffset - endTextW + 6 : endCoords[0] + endOffset - 6;

            return `
            <svg viewBox="${viewBox}" preserveAspectRatio="xMidYMid meet" class="w-full h-full">
                <defs>
                    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
                        <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
                        <feMerge>
                            <feMergeNode in="coloredBlur"/>
                            <feMergeNode in="SourceGraphic"/>
                        </feMerge>
                    </filter>
                    <linearGradient id="trackGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="#f59e0b" />
                        <stop offset="100%" stop-color="#fbbf24" />
                    </linearGradient>
                </defs>

                <!-- Track Shadow -->
                <path d="${route.path}" fill="none" stroke="black" stroke-width="12" stroke-opacity="0.5" filter="blur(4px)" />

                <!-- Sleepers -->
                <path class="track-sleepers" d="${route.path}" 
                      fill="none" stroke="white" stroke-width="8" stroke-linecap="butt" />

                <!-- Rails -->
                <path class="track-rail" d="${route.path}" 
                      fill="none" stroke="url(#trackGradient)" stroke-width="1.5" filter="url(#glow)" 
                      style="transform: translate(-1.5px, -0.5px)" />
                <path class="track-rail" d="${route.path}" 
                      fill="none" stroke="url(#trackGradient)" stroke-width="1.5" filter="url(#glow)" 
                      style="transform: translate(1.5px, 0.5px)" />

                <!-- Waypoints Layer -->
                ${waypointHtml}

                <!-- Origin Node -->
                <g class="waypoint" style="transition-delay: 0.2s">
                    <circle cx="${startCoords[0]}" cy="${startCoords[1]}" r="4" fill="#f59e0b" filter="url(#glow)" />
                    <rect class="waypoint-bg" x="${startBgX}" y="${startCoords[1] - 12}" width="${startTextW}" height="24" />
                    <text x="${startCoords[0] + startOffset}" y="${startCoords[1] + 4}" 
                          fill="white" font-family="JetBrains Mono" font-weight="900" font-size="14" 
                          text-anchor="${startAnchor}">${from}</text>
                </g>

                <!-- Destination Node -->
                <g class="waypoint" style="transition-delay: 1.5s">
                    <circle cx="${endCoords[0]}" cy="${endCoords[1]}" r="6" fill="#fbbf24" filter="url(#glow)" />
                    <rect class="waypoint-bg" x="${endBgX}" y="${endCoords[1] - 16}" width="${endTextW}" height="32" />
                    <text x="${endCoords[0] + endOffset}" y="${endCoords[1] + 7}" 
                          fill="#fbbf24" font-family="JetBrains Mono" font-weight="900" font-size="20" 
                          text-anchor="${endAnchor}">${to}</text>
                </g>
            </svg>`;
        }

        function calculateTimeDiff(start, end) {
            if (!start || !end) return null;
            const [sH, sM] = start.split(':').map(Number);
            const [eH, eM] = end.split(':').map(Number);
            let diff = (eH * 60 + eM) - (sH * 60 + sM);
            if (diff < 0) diff += 1440;
            const h = Math.floor(diff / 60);
            const m = diff % 60;
            return h > 0 ? `${h}h ${m}m` : `${m}m`;
        }

        function toggleCollapsible(id) {
            const el = document.getElementById(id);
            el.classList.toggle('expanded');
        }

        function renderApp() {
            const container = document.getElementById('itinerary-content');
            let html = '';

            itineraryData.forEach(day => {
                html += `
                <div class="mb-16 md:mb-24">

                        <div class="flex flex-col">
                            <span class="text-[8px] md:text-[10px] font-black text-amber-600 uppercase tracking-[0.3em] mb-1">Journeys</span>
                            <h2 class="text-3xl md:text-5xl font-black text-neutral-900 uppercase tracking-tighter italic leading-none">${day.date}</h2>
                        </div>
                        <div class="text-right">
                            <p class="text-[8px] md:text-[10px] font-black text-neutral-400 uppercase tracking-[0.2em] mb-1">Route Type</p>
                            <div class="text-xl md:text-3xl font-black uppercase tracking-tighter">${day.type}</div>
                        </div>
                    </div>
                    <div class="space-y-4">`;

                day.legs.forEach((leg, idx) => {
                    const journeyTime = calculateTimeDiff(leg.departTime, leg.arriveTime);
                    html += `
                    <div id="collapsible-${leg.id}" class="leg-card bg-[#111] rounded-xl md:rounded-2xl shadow-2xl overflow-hidden mb-3 md:mb-4 border border-neutral-800 transition-all">
                        <div onclick="toggleCollapsible('collapsible-${leg.id}')" class="p-4 md:p-5 flex items-center justify-between cursor-pointer hover:bg-neutral-800 transition-colors group select-none">
                            <div class="flex items-center gap-3 md:gap-10">
                                <div class="flex flex-col min-w-[90px] md:min-w-[110px]">
                                    <div class="flex items-baseline gap-1 md:gap-1.5">
                                      <span class="text-amber-500 font-mono text-xl md:text-2xl font-bold leading-none tracking-tighter">${leg.departTime}</span>
                                      <span class="text-neutral-500 font-mono text-[10px] md:text-xs font-bold">/ ${leg.arriveTime}</span>
                                    </div>
                                    <div class="flex items-center gap-1 mt-1 text-neutral-600">
                                        <i data-lucide="timer" class="w-2.5 h-2.5 md:w-2 md:h-2"></i>
                                        <span class="text-[7px] md:text-[8px] font-black uppercase tracking-widest">${journeyTime} run</span>
                                    </div>
                                </div>
                                <div class="flex flex-col">
                                    <h3 class="text-white text-base md:text-lg font-black uppercase tracking-tight leading-none group-hover:text-amber-400 transition-colors">${leg.departStation}</h3>
                                    <div class="flex items-center gap-1.5 md:gap-2 mt-1">
                                        <i data-lucide="chevrons-right" class="w-2.5 h-2.5 text-neutral-600"></i>
                                        <span class="text-neutral-400 text-[8px] md:text-[9px] font-bold uppercase tracking-widest">${leg.arriveStation}</span>
                                    </div>
                                </div>
                            </div>
                            <div class="flex items-center gap-2 md:gap-3">
                                <a href="${leg.liveTrackUrl}" target="_blank" onclick="event.stopPropagation()" class="hidden md:flex p-2.5 bg-neutral-900 hover:bg-amber-500 text-amber-500 hover:text-black rounded-full transition-all border border-neutral-800 hover:border-amber-400 shadow-lg relative group/icon">
                                    <i data-lucide="train-front" class="w-4 h-4 stroke-[2.5px]"></i>
                                </a>
                                <i data-lucide="chevron-down" class="chevron-icon w-4 h-4 md:w-5 md:h-5 text-neutral-600 group-hover:text-amber-500"></i>
                            </div>
                        </div>

                        <div class="collapsible-content">
                            <div class="collapsible-inner">
                                <div class="relative h-[250px] sm:h-[350px] md:h-[400px] w-full overflow-hidden border-t border-neutral-800 bg-black">
                                    <!-- Background Image -->
                                    <img src="${leg.trainImg}" class="absolute inset-0 object-cover w-full h-full opacity-40 grayscale saturate-0 contrast-125 brightness-[0.5]" />
                                    
                                    <!-- Gradient Overlays for readability -->
                                    <div class="absolute inset-0 bg-gradient-to-t from-[#111] via-transparent to-[#111]/40"></div>
                                    <div class="absolute inset-0 bg-black/20"></div>
                                    
                                    <!-- SVG Map Overlay - Constrained to container -->
                                    <div class="map-overlay-container pointer-events-none">
                                        ${createTrainTrackOverlay(leg.departStation, leg.arriveStation)}
                                    </div>

                                    <!-- Sleek Floating Labels positioned top-left -->
                                    <div class="absolute left-4 md:left-6 top-4 md:top-6 z-20 pointer-events-none">
                                        <div class="bg-[#111]/80 backdrop-blur-xl border border-white/10 p-3 md:p-4 rounded-2xl shadow-2xl flex flex-col gap-1.5">
                                            <div class="flex items-center gap-2">
                                                <div class="w-1.5 h-1.5 rounded-full bg-red-500 animate-pulse shadow-[0_0_6px_rgba(239,68,68,0.8)]"></div>
                                                <p class="text-white/80 text-[8px] md:text-[9px] font-black uppercase tracking-[0.2em] leading-none">Live Status</p>
                                            </div>
                                            <div class="mt-1">
                                                <p class="text-amber-500 font-mono text-[10px] md:text-xs font-bold">${leg.trainClass}</p>
                                                <p class="text-neutral-400 text-[8px] md:text-[9px] font-bold uppercase tracking-widest mt-0.5">${leg.operator}</p>
                                            </div>
                                        </div>
                                    </div>

                                    <!-- Clearer Tracker Action Button with Train Icon -->
                                    <div class="absolute right-4 md:right-6 bottom-4 md:bottom-6 z-20">
                                        <a href="${leg.liveTrackUrl}" target="_blank" onclick="event.stopPropagation()" class="group relative flex items-center bg-amber-500 hover:bg-amber-400 text-black px-4 md:px-6 py-3 md:py-3.5 rounded-full font-black text-[10px] md:text-xs uppercase tracking-tighter transition-all shadow-[0_4px_20px_rgba(245,158,11,0.3)] hover:shadow-[0_4px_25px_rgba(245,158,11,0.5)] overflow-hidden active:scale-95 border border-amber-400/50">
                                            <div class="absolute inset-0 w-full h-full bg-gradient-to-r from-transparent via-white/40 to-transparent -translate-x-full animate-shimmer skew-x-12"></div>
                                            <div class="relative z-10 flex items-center gap-2 md:gap-3">
                                                <div class="relative flex items-center justify-center">
                                                    <span class="absolute w-6 h-6 rounded-full border-2 border-black/20 animate-ping"></span>
                                                    <i data-lucide="train-front" class="w-4 h-4 stroke-[2.5px] relative z-10"></i>
                                                </div>
                                                <span class="pt-0.5 tracking-tight">Track Live Train</span>
                                            </div>
                                        </a>
                                    </div>
                                </div>

                                <div class="p-4 md:p-6 bg-neutral-900/40">
                                    <div class="flex flex-col gap-4">
                                        <div class="flex justify-between items-start border-b border-neutral-800 pb-4">
                                            <div class="space-y-1">
                                                <p class="text-amber-500 font-mono text-3xl md:text-4xl font-bold tracking-tight">${leg.departTime}</p>
                                                <h3 class="text-white text-lg md:text-xl font-black uppercase tracking-tight leading-none">${leg.departStation}</h3>
                                            </div>
                                            <div class="text-right space-y-1">
                                                <p class="text-neutral-400 font-mono text-xl md:text-xl font-bold">${leg.arriveTime}</p>
                                                <h3 class="text-neutral-300 text-xs md:text-sm font-bold uppercase tracking-tight">${leg.arriveStation}</h3>
                                            </div>
                                        </div>
                                        <div class="bg-black border border-amber-900/30 p-3 md:p-4 rounded-lg flex flex-wrap items-center gap-3 md:gap-4 shadow-inner">
                                            ${leg.isFreeSeating ? `
                                                <div class="flex flex-col">
                                                    <span class="text-neutral-600 text-[7px] md:text-[8px] font-black uppercase tracking-widest">Seating</span>
                                                    <span class="text-amber-500 font-mono text-sm md:text-lg font-bold uppercase">Free Seating</span>
                                                </div>
                                            ` : `
                                                <div class="flex flex-col">
                                                    <span class="text-neutral-600 text-[7px] md:text-[8px] font-black uppercase tracking-widest">Coach</span>
                                                    <span class="text-amber-500 font-mono text-sm md:text-lg font-bold">${leg.coach}</span>
                                                </div>
                                                <div class="w-[1px] h-6 md:h-8 bg-neutral-800 mx-0.5 md:mx-1"></div>
                                                <div class="flex flex-col">
                                                    <span class="text-neutral-600 text-[7px] md:text-[8px] font-black uppercase tracking-widest">Seats</span>
                                                    <span class="text-amber-500 font-mono text-sm md:text-lg font-bold tracking-widest">${leg.seats}</span>
                                                </div>
                                            `}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>`;

                    const nextLeg = day.legs[idx + 1];
                    if (nextLeg) {
                        const conn = calculateTimeDiff(leg.arriveTime, nextLeg.departTime);
                        html += `
                        <div class="flex items-center gap-3 md:gap-4 mb-3 md:mb-4 px-1 md:px-2">
                            <div class="relative flex items-center gap-2 md:gap-3 bg-neutral-900 text-white px-3 md:px-4 py-1 md:py-1.5 rounded-xl text-[8px] md:text-[9px] font-black uppercase tracking-[0.15em] border border-neutral-700 shadow-xl">
                                <i data-lucide="clock-3" class="w-2.5 h-2.5 md:w-3 md:h-3 text-amber-500"></i> 
                                <span>${conn} Connect: ${leg.arriveStation}</span>
                            </div>
                            <div class="flex-1 h-[1px] bg-neutral-200/10 rounded-full"></div>
                        </div>`;
                    }
                });

                html += '</div>';

                if (day.accommodation) {
                    html += `
                    <div id="${day.accommodation.id}" class="mt-6 md:mt-8 mb-16 md:mb-24 bg-[#111] rounded-xl md:rounded-2xl shadow-2xl overflow-hidden border border-neutral-800 transition-all">
                        <div onclick="toggleCollapsible('${day.accommodation.id}')" class="p-4 md:p-5 flex items-center justify-between cursor-pointer hover:bg-neutral-800 transition-colors group select-none">
                            <div class="flex items-center gap-3 md:gap-10">
                                <div class="flex flex-col min-w-[90px] md:min-w-[110px]">
                                    <span class="text-blue-500 font-mono text-xl md:text-2xl font-bold leading-none tracking-tighter">${day.accommodation.checkIn}</span>
                                    <span class="text-neutral-600 text-[7px] md:text-[8px] font-black uppercase tracking-widest mt-1">Check-in</span>
                                </div>
                                <div class="flex flex-col">
                                    <h3 class="text-white text-sm md:text-lg font-black uppercase tracking-tight leading-none group-hover:text-blue-400 transition-colors">${day.accommodation.name}</h3>
                                    <span class="text-neutral-400 text-[8px] md:text-[9px] font-bold uppercase tracking-widest mt-1 md:mt-1.5 italic">Confirmed</span>
                                </div>
                            </div>
                            <i data-lucide="chevron-down" class="chevron-icon w-4 h-4 md:w-5 md:h-5 text-neutral-600 group-hover:text-blue-500"></i>
                        </div>
                        <div class="collapsible-content">
                            <div class="collapsible-inner">
                                <div class="relative h-[200px] md:h-64 w-full overflow-hidden border-t border-neutral-800">
                                    <img src="${day.accommodation.img}" class="object-cover w-full h-full grayscale brightness-50" />
                                    <div class="absolute inset-0 flex items-center justify-center p-4">
                                         <div class="text-center p-4 md:p-8 bg-black/50 backdrop-blur-md rounded-xl md:rounded-2xl border border-white/10 w-full max-w-xs">
                                            <p class="text-white text-xs md:text-sm font-black uppercase tracking-widest">${day.accommodation.name}</p>
                                            <p class="text-neutral-400 text-[9px] md:text-[10px] mt-2 uppercase">9 Bridge St, Aberdeen AB11 6JL</p>
                                         </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>`;
                }
            });

            container.innerHTML = html;
            lucide.createIcons();
        }

        function updateClock() {
            const now = new Date();
            const clockEl = document.getElementById('live-clock');
            if (clockEl) {
                clockEl.textContent = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            }
        }

        window.onload = () => {
            renderApp();
            setInterval(updateClock, 1000);
            updateClock();
        };
    </script>
</body>
</html>
